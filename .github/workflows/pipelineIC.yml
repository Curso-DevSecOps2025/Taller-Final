name: workflow
on:
    push:
        branches:
          - feat-sast
jobs:
  SAST:
    runs-on: ubuntu-latest
    steps:
        - name: Set up JDK 17
          uses: actions/setup-java@v2
          with:
            java-version: '17'
            distribution: 'adopt'

        - name: Checkout code
          uses: actions/checkout@v2
        - name: build
          run: |
            #cd /d/Curso DEVSECOPS/Taller-Final
            chmod 777 gradlew
            #./gradlew build
        
        - name: Validando existencia del proyecto en Sonarqube
          run: |
               curl -f -X POST -u '${{ secrets.TOKEN_SONAR_TALLERFINAL }}:' 'https://sonarcloud.io/api/projects/create' -d 'name=${{ github.event.repository.name }}' -d 'project=${{ github.event.repository.name }}' -d 'organization=curso-devsecops2025' -d 'visibility=public'
                if [ $? -ne 0 ]; then
                    echo "El proyecto ya existe en SonarQube"
                else
                    echo "Proyecto creado exitosamente"
                    curl -f -X POST -u '${{ secrets.TOKEN_SONAR_TALLERFINAL }}:' 'https://sonarcloud.io/api/project_branches/rename' -d 'name=main' -d 'project=${{ github.event.repository.name }}' -d 'organization=curso-devsecops2025' -d 'visibility=public'
                fi
